<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어반 에이펙스 - 유로트럭 2 트리플 FOV 계산기</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-color: #c5c6c7;
            --white: #ffffff;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .calculator-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            border: 1px solid #45f3ff33;
        }
        h1 {
            color: var(--white);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #45f3ff55;
            background-color: #0b0c10;
            color: var(--white);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45c4be;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.6);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #0b0c10;
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
            display: none;
        }
        .result-item {
            margin-bottom: 15px;
        }
        .result-title {
            font-size: 0.95rem;
            color: var(--text-color);
            margin-bottom: 4px;
        }
        .result-value {
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: 800;
        }
        .result-value.sub-value {
            font-size: 1.5rem;
            color: #ffffff;
        }
        .result-desc {
            font-size: 0.85rem;
            color: #8fa0a3;
            line-height: 1.4;
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h1>유로트럭 2 트리플 FOV 계산기</h1>
    <div class="subtitle">어반 에이펙스 전용 하드웨어 보정 스케일러</div>

    <div class="input-group">
        <label for="screenSize">모니터 크기 (인치)</label>
        <select id="screenSize">
            <option value="" disabled selected>모니터 크기를 선택하세요</option>
            <option value="32">32 인치 (16:9)</option>
            <option value="27">27 인치 (16:9)</option>
            <option value="24">24 인치 (16:9)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="distance">눈과의 거리 (cm)</label>
        <input type="number" id="distance" value="" placeholder="예: 78">
    </div>

    <div class="input-group">
        <label for="angle">사이드 모니터 꺾임 각도 (도, °)</label>
        <input type="number" id="angle" value="" placeholder="예: 68">
    </div>

    <hr style="border: none; border-top: 1px dashed #45f3ff55; margin: 25px 0;">

    <div class="input-group">
        <label for="rawHFOV">해외 계산기 전체 HORIZONTAL FOV 값 입력</label>
        <input type="number" id="rawHFOV" step="0.1" value="" placeholder="예: 167.1">
    </div>

    <button onclick="calculateETS2FOV()">수평 FOV 변환 및 계산하기</button>

    <div class="result-box" id="resultBox">
        <div class="result-item">
            <div class="result-title">계산된 전체 HORIZONTAL FOV (해외 사이트 기준값)</div>
            <div class="result-value sub-value" id="rawFovResult">0.0°</div>
        </div>
        
        <div class="result-item">
            <div class="result-title">유로트럭 2 최종 수평 FOV 입력값 (horizontal_fov_override)</div>
            <div class="result-value" id="fovResult">0.000000</div>
        </div>

        <div class="result-desc">
            ※ 위 최종 입력값을 복사하여 유로트럭 2 세팅 파일(multimon_config.sii) 내의 center, left, right 세 구역의 horizontal_fov_override 항목에 각각 입력하시면 왜곡 없는 완벽한 시야가 완성됩니다!
        </div>
    </div>
</div>

<script>
    function calculateETS2FOV() {
        const screenSizeStr = document.getElementById('screenSize').value;
        const distance = parseFloat(document.getElementById('distance').value);
        const angle = parseFloat(document.getElementById('angle').value);
        const inputRawHFOV = parseFloat(document.getElementById('rawHFOV').value);

        let totalRawHFOV = 0;
        let ets2FOV = 0;

        // 1. 모니터 크기별 물리적 가로 길이 설정 (베젤 제외 순수 액정 화면 가로 치수)
        let screenWidth = 69.73; 
        if (screenSizeStr === "27") screenWidth = 59.77;
        if (screenSizeStr === "24") screenWidth = 53.13;

        // 2. 필수 입력값 검증 (거리값은 공통 필수)
        if (isNaN(distance) || distance <= 0) {
            alert('눈과의 거리를 정확히 입력해 주세요!');
            return;
        }

        // 3. 중앙 모니터의 물리적 삼각함수 기반 단일 HFOV 계산
        const halfWidth = screenWidth / 2;
        const centerRad = Math.atan(halfWidth / distance);
        const singleHFOV = centerRad * (180 / Math.PI) * 2;

        // 4. 유로트럭 2 최종 수평 FOV 계산 (탄젠트 기반 독립 렌더링 스케일 보정 1.156 반영)
        const ets2Rad = Math.atan(Math.tan(centerRad) * 1.156);
        ets2FOV = ets2Rad * (180 / Math.PI) * 2;

        // 5. 입력 방식 분기 처리
        if (!isNaN(inputRawHFOV) && inputRawHFOV > 0) {
            // 하단 해외 계산기 전체 값이 직접 들어온 경우 우선 연동
            totalRawHFOV = inputRawHFOV;
        } else {
            // 상단 실측치 기반 계산일 때 수학적으로 정확한 합산 뷰포트 FOV 도출
            if (!screenSizeStr) {
                alert('모니터 크기를 선택해 주세요!');
                return;
            }
            if (isNaN(angle) || angle <= 0) {
                alert('사이드 모니터 꺾임 각도를 입력해 주세요!');
                return;
            }
            
            const angleRad = angle * (Math.PI / 180);
            const sideRad = Math.atan((halfWidth * Math.cos(angleRad)) / (distance + halfWidth * Math.sin(angleRad)));
            totalRawHFOV = singleHFOV + (sideRad * (180 / Math.PI) * 2);
            totalRawHFOV = Math.round(totalRawHFOV * 10) / 10;
        }

        // 결과 화면 출력 (소수점 6자리 적용)
        document.getElementById('rawFovResult').innerText = totalRawHFOV.toFixed(1) + '°';
        document.getElementById('fovResult').innerText = ets2FOV.toFixed(6);
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
