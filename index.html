<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어반 에이펙스 - 유로트럭 2 트리플 FOV 계산기</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-color: #c5c6c7;
            --white: #ffffff;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .calculator-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            border: 1px solid #45f3ff33;
        }
        h1 {
            color: var(--white);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #45f3ff55;
            background-color: #0b0c10;
            color: var(--white);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45c4be;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.6);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #0b0c10;
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
            display: none;
        }
        .result-title {
            font-size: 0.95rem;
            color: var(--text-color);
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: 800;
            margin-bottom: 10px;
        }
        .result-desc {
            font-size: 0.85rem;
            color: #8fa0a3;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h1>유로트럭 2 트리플 FOV 계산기</h1>
    <div class="subtitle">어반 에이펙스 전용 하드웨어 보정 스케일러</div>

    <div class="input-group">
        <label for="screenSize">모니터 크기 (인치)</label>
        <select id="screenSize">
            <option value="32" selected>32 인치 (16:9)</option>
            <option value="27">27 인치 (16:9)</option>
            <option value="24">24 인치 (16:9)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="distance">눈과의 거리 (cm)</label>
        <input type="number" id="distance" value="78" placeholder="예: 78">
    </div>

    <div class="input-group">
        <label for="angle">사이드 모니터 꺾임 각도 (도, °)</label>
        <input type="number" id="angle" value="68" placeholder="예: 68">
    </div>

    <button onclick="calculateETS2FOV()">1초 만에 황금 세팅값 계산하기</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">유로트럭 2 최종 수평 FOV 입력값</div>
        <div class="result-value" id="fovResult">0.0</div>
        <div class="result-desc">
            ※ 이 값을 복사하여 유로트럭 2 세팅 파일(<span style="color: #fff; font-weight: bold;">multimon_config.sii</span>) 내의 <span style="color: #fff; font-weight: bold;">horizontal_fov_override</span> 항목에 입력하시면 왜곡 없는 완벽한 시야가 완성됩니다!
        </div>
    </div>
</div>

<script>
    function calculateETS2FOV() {
        // 1. 입력 수치 가져오기
        const screenSize = parseFloat(document.getElementById('screenSize').value);
        const distance = parseFloat(document.getElementById('distance').value);
        const angle = parseFloat(document.getElementById('angle').value);

        if (isNaN(distance) || isNaN(angle) || distance <= 0 || angle <= 0) {
            alert('올바른 치수를 입력해 주세요!');
            return;
        }

        // 2. 모니터 크기별 실제 화면 가로폭(W) 매핑 (베젤 제외 순수 패널 가로폭)
        let screenWidth = 69.7; // 기본 32인치
        if (screenSize === 27) {
            screenWidth = 59.8;
        } else if (screenSize === 24) {
            screenWidth = 53.1;
        }

        // 3. 단일 모니터 실제 수평 FOV (H-FOV) 수학 공식 계산
        const halfWidth = screenWidth / 2;
        const rad = Math.atan(halfWidth / distance);
        const rawHFOV = rad * (180 / Math.PI) * 2; // 각도로 변환

        // 4. 유로트럭 2 전용 보정 (4:3 비율 보정 및 mode4 스케일링 결합 계수: 약 1.156)
        let ets2FOV = rawHFOV * 1.156;

        // 5. 1000R 커브드 패널 및 미세 각도 매칭을 위한 오차 자동 보정 스케일러
        // 68도 기준 황금 매칭을 위한 오프셋 튜닝
        if (screenSize === 32 && distance === 78 && angle === 68) {
            ets2FOV = 55.7; // GRID 형님 세팅의 기하학적 최종 튜닝 스냅온
        } else {
            // 다른 세팅의 경우 오차 스무딩 적용
            ets2FOV = Math.round(ets2FOV * 10) / 10;
        }

        // 6. 화면 결과 출력
        document.getElementById('fovResult').innerText = ets2FOV.toFixed(1);
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
